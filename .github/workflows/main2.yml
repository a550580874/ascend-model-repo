name: Scheduled Scraper

on:
  schedule:
    # 建议生产环境设为 '0 */1 * * *' (每小时一次)
    # 目前保持你代码中的每分钟触发
    - cron: '*/1 * * * *' 
  workflow_dispatch: 

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Scraper
        run: python collector.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # 关键修正：确保创建 data 目录并添加正确的文件路径
          mkdir -p data
          git add data/ascend_model.json
          
          # 如果文件没有变化，直接跳过不报错
          git commit -m "Auto-update model data: $(date)" || exit 0
          git push
