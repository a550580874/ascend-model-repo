name: Scheduled Scraper

# 1. 触发时机
on:
  schedule:
    # 建议设为每小时一次，保证时效性且安全
    - cron: '*/1 * * * *' 
  workflow_dispatch: # 增加此项可以让你在网页上手动点击按钮立即运行

# 2. 具体任务
jobs:
  scrape_job:
    runs-on: ubuntu-latest # 使用 GitHub 提供的最新版 Ubuntu 环境
    
    # 2026年权限新规：必须明确开启写入权限才能推送数据回仓库
    permissions:
      contents: write 

    steps:
      # 第一步：下载仓库代码到这台云端电脑
      - name: Checkout Code
        uses: actions/checkout@v4

      # 第二步：安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 第三步：安装你的爬虫依赖
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # 第四步：运行你的爬虫脚本
      - name: Run Scraper
        run: python collector.py

      # 第五步：将更新后的 ascend_models.json 存回仓库
      - name: Commit and Push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action Bot"
          git add ascend_models.json
          # 如果文件没变化，直接跳过不报错
          git commit -m "Auto-update model data: $(date)" || exit 0
          git push
